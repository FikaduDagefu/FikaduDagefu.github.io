        /* Color Palette */
        :root {
            --primary: #1e3a8a;
            --primary-light: #eff6ff;
            --text: #1f2937;
            --text-muted: #4b5563;
            --border: #e5e7eb;
            --bg: #f9fafb;
            --bg-sidebar: #ffffff;
        }
        body {
            font-family: "Inter", system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        /* Two-Column Grid Layout */
        .layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            min-height: 100vh;
        }
        @media (max-width: 800px) {
            .layout {
                grid-template-columns: 1fr;
            }
        }
        /* Sidebar Styling */
        .sidebar {
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            padding: 3rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        /* Headshot Placeholder */
        .headshot-container {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background-color: var(--primary-light);
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            overflow: hidden;
            color: var(--primary);
            font-weight: bold;
            font-size: 0.9rem;
        }
        .sidebar h1 {
            font-size: 1.8rem;
            color: var(--primary);
            margin: 0 0 0.5rem 0;
        }
        .sidebar h2 {
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-muted);
            margin: 0 0 1.5rem 0;
            border-bottom: none;
        }
        .contact-info {
            width: 100%;
            text-align: left;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            font-size: 0.95rem;
            color: var(--text-muted);
        }
        .contact-info p {
            margin: 0.5rem 0;
        }
        /* Main Content Area */
        .main-content {
            padding: 3rem 4rem;
            max-width: 900px;
        }
        @media (max-width: 800px) {
            .main-content {
                padding: 2rem 1.5rem;
            }
        }

            border-bottom: 2px solid var(--border);

            gap: 1.5rem;
            flex-wrap: wrap;
        }
